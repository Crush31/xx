<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Happy Birthday</title>
    <link rel="stylesheet" type="text/css" href="../css/styles.css">
</head>

<body>
    <div class="htmleaf-container">
        <div class="wrapper">
            <div class="container">
                <h1>生日快乐!</h1>
                <form class="form" id="loginForm">
                    <input id="userName" name="userName" type="text" placeholder="姓名" required>
                    <input id="pwd" name="pwd" type="password" placeholder="生日 (6位数字)" required>
                    <button type="submit" id="login-button">进入</button>
                </form>
            </div>
            <ul class="bg-bubbles">
                <li></li><li></li><li></li><li></li><li></li>
                <li></li><li></li><li></li><li></li><li></li>
            </ul>
        </div>
    </div>

    <script src="../js/jquery-2.1.1.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#loginForm').on('submit', function(e) {
                e.preventDefault();
                
                var userName = $('#userName').val().trim();
                var pwd = $('#pwd').val().trim();
                
                // 验证6位数字
                if (pwd.length === 6 && /^\d{6}$/.test(pwd)) {
                    // 先测试跳转到 Cl.html（确认存在的文件）
                    window.location.href = '../Cl.html?name=' + encodeURIComponent(userName);
                } else {
                    alert('请输入正确的生日（6位数字，例如：010101）');
                }
            });
        });
    </script>
</body>

</html>
