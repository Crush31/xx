<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Happy Birthday</title>
    <link rel="stylesheet" type="text/css" href="../css/styles.css">
</head>

<body>
    <div class="htmleaf-container">
        <div class="wrapper">
            <div class="container">
                <h1>生日快乐!</h1>
                <form class="form" id="loginForm">
                    <input id="userName" name="userName" type="text" placeholder="姓名" required>
                    <input id="pwd" name="pwd" type="text" placeholder="生日 (6位数字，如: 010101)" required>
                    <button type="submit" id="login-button">进入</button>
                </form>
            </div>
            <ul class="bg-bubbles">
                <li></li><li></li><li></li><li></li><li></li>
                <li></li><li></li><li></li><li></li><li></li>
            </ul>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var form = document.getElementById('loginForm');
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                var userName = document.getElementById('userName').value.trim();
                var pwd = document.getElementById('pwd').value.trim();
                
                // 验证6位数字
                if (/^\d{6}$/.test(pwd)) {
                    // 直接跳转到蛋糕页
                    window.location.href = '../BirthdayCake.html?name=' + encodeURIComponent(userName);
                } else {
                    alert('请输入正确的6位生日数字（例如：010101）');
                }
            });
        });
    </script>
</body>

</html>
